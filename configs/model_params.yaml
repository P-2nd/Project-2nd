# 실험 공통 설정과 모델별 하이퍼파라미터를 이 파일에서 관리한다.
project: churn-prediction
target_column: Churn
random_state: 42
test_size: 0.2
training_fractions: [1.0, 0.5]

# 소규모 KNN 기준 모델 설정
knn_baseline:
  n_neighbors: 15
  weights: distance
  n_jobs: 1
  max_rows: 30000
  validation_size: 0.25

xgboost:
  # 전처리 산출물(data/processed/churn_preprocessed_full.csv)을 입력으로 쓴다.
  # 고정 Test/Validation을 만든 뒤 학습 데이터만 training_fractions로 줄인다.
  validation_size: 0.2
  # Validation 성능이 이 횟수만큼 개선되지 않으면 부스팅을 멈춘다.
  early_stopping_rounds: 50
  # f1: Validation에서 F1이 최대인 임계값 사용(KNN 기준선과 동일 조건)
  # fixed: threshold_value를 그대로 사용
  threshold_strategy: f1
  threshold_value: 0.5
  # 이탈 38.6% / 유지 61.4%로 불균형이 크지 않고 임계값을 따로 조정하므로 기본은 끈다.
  # 이탈 Recall을 더 밀어야 하면 1.59(= 유지/이탈 비율) 부근부터 시험한다.
  scale_pos_weight: null
  params:
    n_estimators: 2000
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    reg_alpha: 0.0
    tree_method: hist
    eval_metric: aucpr
    n_jobs: -1
